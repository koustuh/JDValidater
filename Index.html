<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Validator Project</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#0078D7;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    margin:30px auto;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

button{
    background:#0078D7;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#005fa3;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:left;
}

th{
    background:#0078D7;
    color:white;
}
</style>

</head>

<body>

<header>
<h1>JD Validator Project</h1>
<p>Select a module to open</p>
</header>

<div class="container">

<div class="card">

<table>

<tr>
<th>Module</th>
<th>Open</th>
</tr>

<tr>
<td>Preview 2</td>
<td>
<button onclick="window.open('preview (2).html','_blank')">
Open
</button>
</td>
</tr>

<tr>
<td>Preview 3</td>
<td>
<button onclick="window.open('preview (3).html','_blank')">
Open
</button>
</td>
</tr>

<tr>
<td>Preview 4</td>
<td>
<button onclick="window.open('preview (4).html','_blank')">
Open
</button>
</td>
</tr>

<tr>
<td>Preview 5</td>
<td>
<button onclick="window.open('preview (5).html','_blank')">
Open
</button>
</td>
</tr>

</table>

</div>

<div class="card">

<h2>Open All Modules</h2>

<button onclick="openAll()">
Open All
</button>

</div>

</div>

<script>

function openAll(){

window.open("preview (2).html","_blank");

window.open("preview (3).html","_blank");

window.open("preview (4).html","_blank");

window.open("preview (5).html","_blank");

}

</script>

</body>
</html>
