<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Role Extractor</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    margin:30px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
h2{
    text-align:center;
}
textarea{
    width:100%;
    height:250px;
    font-size:15px;
    padding:10px;
}
button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
    font-size:15px;
}
#status{
    margin-top:15px;
    font-weight:bold;
}
.valid{
    color:green;
}
.invalid{
    color:red;
}
ul{
    margin-top:20px;
}
li{
    margin-bottom:8px;
    padding:8px;
    background:#f0f8ff;
    border-left:5px solid #0078d7;
}
</style>

</head>
<body>

<div class="container">

<h2>Job Description (JD) Role Extractor</h2>

<textarea id="jd" placeholder="Paste Job Description here..."></textarea>

<br>

<button onclick="validateJD()">Validate & Extract</button>
<button onclick="copyRoles()">Copy Roles</button>
<button onclick="downloadRoles()">Download</button>
<button onclick="clearAll()">Clear</button>

<div id="status"></div>

<h3>Extracted Roles / Responsibilities</h3>

<ul id="roleList"></ul>

</div>

<script>

let extractedRoles=[];

function validateJD(){

    const text=document.getElementById("jd").value.trim();

    const status=document.getElementById("status");

    const list=document.getElementById("roleList");

    list.innerHTML="";
    extractedRoles=[];

    if(text.length<100){
        status.className="invalid";
        status.innerHTML="❌ This does not appear to be a complete Job Description.";
        return;
    }

    const keywords=[
        "responsibilities",
        "requirements",
        "skills",
        "experience",
        "qualification",
        "role",
        "job description",
        "must have",
        "preferred"
    ];

    let score=0;

    keywords.forEach(k=>{
        if(text.toLowerCase().includes(k))
            score++;
    });

    if(score<2){
        status.className="invalid";
        status.innerHTML="⚠ This may not be a valid Job Description.";
    }
    else{
        status.className="valid";
        status.innerHTML="✅ Valid Job Description detected.";
    }

    extractRoles(text);
}

function extractRoles(text){

    const lines=text.split(/\n/);

    const list=document.getElementById("roleList");

    lines.forEach(line=>{

        let t=line.trim();

        if(t.length<10)
            return;

        t=t.replace(/^[0-9]+[.)-]?\s*/,"");
        t=t.replace(/^[-•*]\s*/,"");

        if(
            t.match(/^[A-Z]/i) &&
            (
             t.includes("develop")||
             t.includes("design")||
             t.includes("build")||
             t.includes("maintain")||
             t.includes("support")||
             t.includes("create")||
             t.includes("implement")||
             t.includes("manage")||
             t.includes("analyze")||
             t.includes("test")||
             t.includes("review")||
             t.includes("work")||
             t.includes("collaborate")||
             t.includes("troubleshoot")||
             t.includes("lead")||
             t.includes("coordinate")||
             t.includes("monitor")
            )
        ){

            extractedRoles.push(t);

            const li=document.createElement("li");
            li.innerText=t;
            list.appendChild(li);

        }

    });

    if(extractedRoles.length==0){

        const li=document.createElement("li");
        li.innerHTML="No responsibilities found.";
        list.appendChild(li);

    }

}

function copyRoles(){

    if(extractedRoles.length==0){
        alert("No roles found.");
        return;
    }

    navigator.clipboard.writeText(extractedRoles.join("\n"));

    alert("Copied.");

}

function downloadRoles(){

    if(extractedRoles.length==0){
        alert("No roles found.");
        return;
    }

    const blob=new Blob([extractedRoles.join("\n")],{type:"text/plain"});

    const a=document.createElement("a");

    a.href=URL.createObjectURL(blob);

    a.download="JD_Roles.txt";

    a.click();

}

function clearAll(){

    document.getElementById("jd").value="";
    document.getElementById("status").innerHTML="";
    document.getElementById("roleList").innerHTML="";
    extractedRoles=[];

}

</script>

</body>
</html>
